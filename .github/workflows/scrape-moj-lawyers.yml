name: 爬取法務部律師資料

on:
  schedule:
    - cron: '0 18 * * 0'  # 每週日 UTC 18:00 = 台灣週一凌晨 2:00
  workflow_dispatch: {}

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run MOJ lawyer scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        working-directory: scripts
        run: python moj_lawyer_scraper.py

      - name: Trigger firm stats cache refresh (async)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          # 見 moj-licno-scan.yml 同名 step 的說明：fire-and-forget 避開 CF 521
          http_code=$(curl -sk -o /tmp/refresh_resp.txt -w "%{http_code}" \
            --max-time 5 \
            -X POST "$SUPABASE_URL/rest/v1/rpc/refresh_firm_stats_cache" \
            -H "apikey: $SUPABASE_SERVICE_KEY" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_KEY" \
            -H "Content-Type: application/json" -d '{}' || echo "TIMEOUT")
          echo "Refresh trigger response: $http_code"
          if [ -f /tmp/refresh_resp.txt ]; then
            head -c 500 /tmp/refresh_resp.txt; echo
          fi
          case "$http_code" in
            204|200|TIMEOUT) echo "OK — refresh triggered" ;;
            *) echo "::warning::Cache refresh trigger returned $http_code (non-fatal)" ;;
          esac
