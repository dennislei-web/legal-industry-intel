name: 爬取法務部律師資料

on:
  schedule:
    - cron: '0 18 * * 0'  # 每週日 UTC 18:00 = 台灣週一凌晨 2:00
  workflow_dispatch: {}

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run MOJ lawyer scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        working-directory: scripts
        run: python moj_lawyer_scraper.py

      - name: Refresh all caches (with retry)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          for rpc in refresh_firm_stats_cache refresh_lawyer_stats; do
            success=0
            for attempt in 1 2 3; do
              http_code=$(curl -sk -o /tmp/resp.txt -w "%{http_code}" \
                --max-time 180 \
                -X POST "$SUPABASE_URL/rest/v1/rpc/${rpc}" \
                -H "apikey: $SUPABASE_SERVICE_KEY" \
                -H "Authorization: Bearer $SUPABASE_SERVICE_KEY" \
                -H "Content-Type: application/json" -d '{}' 2>&1 || echo "ERR")
              echo "${rpc} attempt ${attempt}: HTTP $http_code"
              case "$http_code" in
                204|200) echo "  ✅ OK"; success=1; break ;;
                5*|52*|ERR) echo "  retrying in 60s..."; sleep 60 ;;
                *) echo "::warning::${rpc} returned $http_code"; cat /tmp/resp.txt | head -c 300; echo; break ;;
              esac
            done
            [ $success -eq 0 ] && echo "::warning::${rpc} failed after retries"
          done
