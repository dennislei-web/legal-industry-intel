name: MOJ 律師補掃（證號遍歷）

on:
  workflow_dispatch:
    inputs:
      years:
        description: '要掃的年份（留空=自動掃 92~最新；可輸入逗號分隔，例如 112,113,114,115）'
        required: false
        default: ''
      detail_fetch:
        description: '掃完後是否補抓詳細資料'
        required: false
        default: 'true'

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run 證號遍歷
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        working-directory: scripts
        run: |
          YEARS="${{ github.event.inputs.years }}"
          if [ -z "$YEARS" ]; then
            echo "=== 證號遍歷（自動：92~最新）==="
            python moj_licno_scan.py
          else
            ARGS=$(echo "$YEARS" | tr ',' ' ')
            echo "=== 證號遍歷（指定年份：$ARGS）==="
            python moj_licno_scan.py $ARGS
          fi

      - name: Refresh firm stats cache
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          curl -sk "$SUPABASE_URL/rest/v1/rpc/refresh_firm_stats_cache" \
            -X POST -H "apikey: $SUPABASE_SERVICE_KEY" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_KEY" \
            -H "Content-Type: application/json" -d '{}'
          echo "Cache refreshed"

      - name: Fetch lawyer details
        if: github.event.inputs.detail_fetch == 'true'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        working-directory: scripts
        run: python moj_lawyer_detail_fetch.py 2000
