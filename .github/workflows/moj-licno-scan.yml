name: MOJ 律師補掃（證號遍歷）

on:
  workflow_dispatch:
    inputs:
      years:
        description: '要掃的年份（留空=自動掃 92~最新；可輸入逗號分隔，例如 112,113,114,115）'
        required: false
        default: ''
      detail_fetch:
        description: '掃完後是否補抓詳細資料'
        required: false
        default: 'true'

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run 證號遍歷
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        working-directory: scripts
        run: |
          YEARS="${{ github.event.inputs.years }}"
          # schedule 觸發時 inputs 為空，預設跑 112~115
          if [ -z "$YEARS" ] && [ "${{ github.event_name }}" = "schedule" ]; then
            YEARS="112,113,114,115"
          fi
          if [ -z "$YEARS" ]; then
            echo "=== 證號遍歷（自動：92~最新）==="
            python moj_licno_scan.py
          else
            ARGS=$(echo "$YEARS" | tr ',' ' ')
            echo "=== 證號遍歷（指定年份：$ARGS）==="
            python moj_licno_scan.py $ARGS
          fi

      - name: Refresh all caches (with retry)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          # 剛跑完大量寫入，Supabase 可能還忙。用長 timeout + 重試確保真的 refresh 到
          for rpc in refresh_firm_stats_cache refresh_lawyer_stats; do
            success=0
            for attempt in 1 2 3; do
              http_code=$(curl -sk -o /tmp/resp.txt -w "%{http_code}" \
                --max-time 180 \
                -X POST "$SUPABASE_URL/rest/v1/rpc/${rpc}" \
                -H "apikey: $SUPABASE_SERVICE_KEY" \
                -H "Authorization: Bearer $SUPABASE_SERVICE_KEY" \
                -H "Content-Type: application/json" -d '{}' 2>&1 || echo "ERR")
              echo "${rpc} attempt ${attempt}: HTTP $http_code"
              case "$http_code" in
                204|200) echo "  ✅ OK"; success=1; break ;;
                5*|52*|ERR) echo "  retrying in 60s..."; sleep 60 ;;
                *) echo "::warning::${rpc} returned $http_code"; cat /tmp/resp.txt | head -c 300; echo; break ;;
              esac
            done
            [ $success -eq 0 ] && echo "::warning::${rpc} failed after retries (non-fatal, 下次爬蟲會重刷)"
          done

      - name: Wait for cache refresh to settle
        if: github.event.inputs.detail_fetch == 'true' || github.event_name == 'schedule'
        run: |
          echo "Sleep 90s 讓 refresh_firm_stats_cache 在 Supabase 跑完，避免下個 step 撞鎖"
          sleep 90

      - name: Fetch lawyer details
        if: github.event.inputs.detail_fetch == 'true' || github.event_name == 'schedule'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        working-directory: scripts
        run: python moj_lawyer_detail_fetch.py 2000
