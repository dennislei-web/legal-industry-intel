name: MOJ 律師補掃（證號遍歷）

on:
  schedule:
    # === 一次性排程：2026-04-16 00:00 台灣 = 16:00 UTC ===
    # 跑完後請刪除此 schedule block（改回純 workflow_dispatch）
    - cron: '0 16 16 4 *'
  workflow_dispatch:
    inputs:
      years:
        description: '要掃的年份（留空=自動掃 92~最新；可輸入逗號分隔，例如 112,113,114,115）'
        required: false
        default: ''
      detail_fetch:
        description: '掃完後是否補抓詳細資料'
        required: false
        default: 'true'

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run 證號遍歷
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        working-directory: scripts
        run: |
          YEARS="${{ github.event.inputs.years }}"
          # schedule 觸發時 inputs 為空，預設跑 112~115
          if [ -z "$YEARS" ] && [ "${{ github.event_name }}" = "schedule" ]; then
            YEARS="112,113,114,115"
          fi
          if [ -z "$YEARS" ]; then
            echo "=== 證號遍歷（自動：92~最新）==="
            python moj_licno_scan.py
          else
            ARGS=$(echo "$YEARS" | tr ',' ' ')
            echo "=== 證號遍歷（指定年份：$ARGS）==="
            python moj_licno_scan.py $ARGS
          fi

      - name: Refresh all caches (async)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          # Fire-and-forget 兩個 cache：firm_stats + lawyer_stats
          for rpc in refresh_firm_stats_cache refresh_lawyer_stats; do
            http_code=$(curl -sk -o /tmp/resp_${rpc}.txt -w "%{http_code}" \
              --max-time 10 \
              -X POST "$SUPABASE_URL/rest/v1/rpc/${rpc}" \
              -H "apikey: $SUPABASE_SERVICE_KEY" \
              -H "Authorization: Bearer $SUPABASE_SERVICE_KEY" \
              -H "Content-Type: application/json" -d '{}' || echo "TIMEOUT")
            echo "${rpc}: HTTP $http_code"
            case "$http_code" in
              204|200|TIMEOUT) echo "  OK" ;;
              *) echo "::warning::${rpc} returned $http_code (non-fatal)"; cat /tmp/resp_${rpc}.txt | head -c 300; echo ;;
            esac
          done

      - name: Wait for cache refresh to settle
        if: github.event.inputs.detail_fetch == 'true' || github.event_name == 'schedule'
        run: |
          echo "Sleep 90s 讓 refresh_firm_stats_cache 在 Supabase 跑完，避免下個 step 撞鎖"
          sleep 90

      - name: Fetch lawyer details
        if: github.event.inputs.detail_fetch == 'true' || github.event_name == 'schedule'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        working-directory: scripts
        run: python moj_lawyer_detail_fetch.py 2000
