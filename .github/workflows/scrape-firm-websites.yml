name: 搜尋事務所官網

on:
  schedule:
    - cron: '40 20 * * *'  # 每日 UTC 20:40 = 台灣凌晨 4:40
  workflow_dispatch:
    inputs:
      batch_size:
        description: '爬取筆數 (0 = 全部)'
        required: false
        default: '0'
      scrape_delay:
        description: '每次搜尋間隔秒數'
        required: false
        default: '1.8'
      retry_missing:
        description: '重試未找到官網的事務所'
        required: false
        default: 'false'

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 350  # ~5.8 小時，足以跑 5900 間 × 1.8s ≈ 3 hr
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Search firm websites
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          BATCH_SIZE: ${{ github.event.inputs.batch_size || '0' }}
          SCRAPE_DELAY: ${{ github.event.inputs.scrape_delay || '1.8' }}
          RETRY_MISSING: ${{ github.event.inputs.retry_missing || 'false' }}
        working-directory: scripts
        run: python scrape_firm_websites.py
